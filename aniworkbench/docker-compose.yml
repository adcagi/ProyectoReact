services:
  app:
    build:
      context: ./aniworkbench
      dockerfile: Dockerfile
    container_name: laravel_app
    volumes:
      - /var/www/laravel-app:/var/www/laravel-app
    networks:
      - laravel
  webserver:
    image: nginx:alpine
    container_name: laravel_nginx
    ports:
      - "80:80"
    volumes:
      - /var/www/laravel-app:/var/www/laravel-app
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - laravel
networks:
  laravel:
    driver: bridge